<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#113b3c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Budget" />
    <title>Budget App</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=60" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Persönliches Monatsbudget</p>
          <h1>Budget</h1>
        </div>
        <label class="month-picker">
          <span>Monat</span>
          <input id="monthInput" type="month" />
        </label>
      </header>

      <section class="summary-grid" aria-label="Monatsübersicht">
        <article class="metric income-metric" data-summary="income">
          <span>Einnahmen gesamt</span>
          <strong id="familyIncomeValue">0,00 €</strong>
        </article>
        <article class="metric expense-metric" data-summary="expense">
          <span>Ausgaben gesamt</span>
          <strong id="familyExpenseValue">0,00 €</strong>
        </article>
        <article class="metric primary" data-summary="balance">
          <span>Plus / Minus</span>
          <strong id="remainingValue">0,00 €</strong>
        </article>
        <article class="metric debt-metric" data-summary="debt">
          <span>Restschulden</span>
          <strong id="totalDebtValue">0,00 €</strong>
        </article>
        <article class="metric asset-metric" data-summary="asset">
          <span>Vermögen</span>
          <strong id="totalAssetValue">0,00 €</strong>
        </article>
      </section>
      <section id="summaryBreakdown" class="panel summary-breakdown" hidden>
        <div class="panel-title">
          <h2 id="summaryBreakdownTitle">Zusammensetzung</h2>
          <button id="summaryBreakdownClose" class="icon-button" type="button" title="Schließen" aria-label="Schließen">×</button>
        </div>
        <div id="summaryBreakdownList" class="summary-breakdown-list"></div>
      </section>

      <section class="panel people-panel">
        <div class="panel-title">
          <h2>Familie</h2>
          <div class="person-add">
            <input id="personNameInput" maxlength="80" type="text" placeholder="Vorname Nachname" autocomplete="off" />
            <button id="addPersonButton" class="icon-button" type="button" title="Person hinzufügen" aria-label="Person hinzufügen">+</button>
          </div>
        </div>
        <div id="personSummaryList" class="person-summary-list"></div>
      </section>

      <div class="quick-actions">
        <button id="toggleFormButton" class="submit-button compact-submit" type="button">+ Neuer Eintrag</button>
        <p id="formMessage" class="form-message" role="status"></p>
        <button id="clearButton" class="secondary-button danger-button quick-clear-button" type="button" title="Alles löschen (nur ausgewählte Person oder Gesamt)">Alles löschen</button>
      </div>

      <section class="workspace form-workspace">
        <div id="mainFormSlot"></div>
        <form id="entryForm" class="panel entry-form" hidden>
          <div class="panel-title">
            <h2 id="formTitle">Einfach eintragen</h2>
            <button id="resetFormButton" class="icon-button" type="button" title="Formular leeren" aria-label="Formular leeren">↺</button>
          </div>
          <input id="entryId" type="hidden" />
          <input id="debtId" type="hidden" />
          <div class="form-grid">
            <label>
              <span>Person</span>
              <select id="personInput"></select>
            </label>
            <label data-type-field>
              <span>Typ</span>
              <select id="typeInput">
                <option value="expense">Ausgabe</option>
                <option value="income">Einnahme</option>
                <option value="debt">Schuld / Kredit</option>
              </select>
            </label>
            <label data-normal-field>
              <span>Datum</span>
              <input id="dateInput" type="date" autocomplete="off" />
            </label>
            <label data-normal-field>
              <span>Kategorie</span>
              <select id="categoryInput"></select>
            </label>
            <label data-normal-field>
              <span>Betrag</span>
              <span class="money-input">
                <input id="amountInput" inputmode="decimal" type="text" autocomplete="off" />
                <span>€</span>
              </span>
            </label>
            <label class="wide" data-normal-field>
              <span>Beschreibung</span>
              <input id="descriptionInput" autocomplete="off" maxlength="80" type="text" />
            </label>
            <label data-normal-field>
              <span>Zahlungsart</span>
              <select id="paymentInput">
                <option>Karte</option>
                <option>Bar</option>
                <option>Überweisung</option>
                <option>Lastschrift</option>
              </select>
            </label>
            <label class="toggle-row" data-normal-field>
              <input id="recurringInput" type="checkbox" />
              <span>monatlich</span>
            </label>
            <label data-debt-field>
              <span>Bei wem</span>
              <input id="creditorInput" autocomplete="off" maxlength="60" type="text" />
            </label>
            <label data-debt-field>
              <span>Gesamtschuld</span>
              <span class="money-input">
                <input id="debtTotalInput" inputmode="decimal" type="text" autocomplete="off" />
                <span>€</span>
              </span>
            </label>
            <label data-debt-field>
              <span>Bisher bezahlt</span>
              <span class="money-input">
                <input id="paidSoFarInput" inputmode="decimal" type="text" autocomplete="off" />
                <span>€</span>
              </span>
            </label>
            <label data-debt-field>
              <span>Startdatum</span>
              <input id="debtStartInput" type="date" autocomplete="off" />
            </label>
            <label data-debt-field>
              <span>Bis Datum</span>
              <input id="debtEndInput" type="date" autocomplete="off" />
            </label>
            <label data-debt-field>
              <span>Zahlungsart</span>
              <select id="debtPaymentMethodInput">
                <option value=""></option>
                <option>Lastschrift</option>
                <option>Überweisung</option>
                <option>Karte</option>
                <option>Bar</option>
              </select>
            </label>
            <label data-debt-field>
              <span>Von Konto</span>
              <input id="debtAccountInput" autocomplete="off" maxlength="60" type="text" />
            </label>
            <label data-debt-field>
              <span>Monatlich</span>
              <span class="money-input">
                <input id="debtPaymentInput" inputmode="decimal" type="text" autocomplete="off" />
                <span>€</span>
              </span>
            </label>
            <label data-debt-field>
              <span>Nettokredit</span>
              <span class="money-input">
                <input id="principalInput" inputmode="decimal" type="text" autocomplete="off" />
                <span>€</span>
              </span>
            </label>
            <label data-debt-field>
              <span>Zinsen gesamt</span>
              <span class="money-input">
                <input id="interestInput" inputmode="decimal" type="text" autocomplete="off" />
                <span>€</span>
              </span>
            </label>
            <label data-debt-field>
              <span>Sollzins pro Jahr</span>
              <span class="percent-input">
                <input id="nominalRateInput" inputmode="decimal" type="text" autocomplete="off" />
                <span>%</span>
              </span>
            </label>
            <label data-debt-field>
              <span>Laufzeit in Monaten</span>
              <input id="termInput" inputmode="numeric" type="number" min="0" autocomplete="off" />
            </label>
            <label data-debt-field>
              <span>Letzte Rate</span>
              <span class="money-input">
                <input id="finalPaymentInput" inputmode="decimal" type="text" autocomplete="off" />
                <span>€</span>
              </span>
            </label>
          </div>
          <button class="submit-button" type="submit">Speichern</button>
        </form>

        <section class="panel" hidden>
          <div class="panel-title">
            <h2>Kategorien</h2>
            <button id="addCategoryButton" class="icon-button" type="button" title="Kategorie hinzufügen" aria-label="Kategorie hinzufügen">+</button>
          </div>
          <div id="categoryList" class="category-list"></div>
        </section>
      </section>

      <section class="workspace debt-workspace single-list">
        <section class="panel">
          <details open class="collapsible-panel">
            <summary class="panel-title">
              <h2 id="debtTitle">Schulden</h2>
              <span class="mini-pill debt-pill" id="debtTotalMini">0 €</span>
              <span class="section-actions">
                <button id="addDebtButton" class="secondary-button section-add-button" type="button">+ Schuld</button>
                <button id="clearDebtsButton" class="secondary-button danger-button section-clear-button" type="button" title="Alle Schulden leeren">Schulden leeren</button>
              </span>
            </summary>
            <div id="debtList" class="debt-list"></div>
          </details>
          <div id="debtFormSlot"></div>
        </section>
      </section>

      <section class="workspace asset-workspace single-list">
        <section class="panel">
          <details open class="collapsible-panel">
            <summary class="panel-title">
              <h2 id="assetTitle">Vermögen</h2>
              <span class="mini-pill asset-pill" id="assetTotalMini">0 €</span>
              <span class="section-actions">
                <button id="addAssetButton" class="secondary-button section-add-button" type="button">+ Vermögen</button>
                <button id="clearAssetsButton" class="secondary-button danger-button section-clear-button" type="button" title="Alle Vermögen leeren">Vermögen leeren</button>
              </span>
            </summary>
            <div id="assetList" class="asset-list"></div>
          </details>
        </section>
      </section>

      <section class="panel list-panel">
        <details open class="collapsible-panel">
          <summary class="panel-title list-title">
            <h2 id="entryTitle">Einnahmen und Ausgaben</h2>
            <span class="panel-totals">
              <span class="mini-pill income-pill" id="entryIncomeMini">0 €</span>
              <span class="mini-pill expense-pill" id="entryExpenseMini">0 €</span>
            </span>
            <div class="list-actions">
              <button id="addIncomeButton" class="secondary-button section-add-button income-action" type="button">+ Einnahme</button>
              <button id="addExpenseButton" class="secondary-button section-add-button expense-action" type="button">+ Ausgabe</button>
              <select id="filterInput" aria-label="Einträge filtern">
                <option value="all">Alle</option>
                <option value="expense">Ausgaben</option>
                <option value="income">Einnahmen</option>
                <option value="recurring">Monatlich</option>
              </select>
              <button id="exportButton" class="secondary-button" type="button">Export</button>
              <label class="secondary-button import-label">
                Import Excel/CSV
                <input id="importInput" type="file" accept=".xlsx,.json,.csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/json,text/csv" />
              </label>
              <button id="clearEntriesButton" class="secondary-button danger-button section-clear-button" type="button" title="Nur Buchungen leeren">Buchungen leeren</button>
            </div>
          </summary>
          <div id="entryList" class="entry-list"></div>
        </details>
        <div id="entryFormSlot"></div>
      </section>
    </main>

    <div id="promptDialog" class="confirm-dialog" hidden role="dialog" aria-modal="true" aria-labelledby="promptDialogTitle">
      <div class="confirm-dialog-backdrop"></div>
      <div class="confirm-dialog-box">
        <h2 id="promptDialogTitle" class="confirm-dialog-title">Eingabe</h2>
        <p id="promptDialogMessage" class="confirm-dialog-message"></p>
        <input id="promptDialogInput" class="prompt-dialog-input" type="text" autocomplete="off" />
        <div class="confirm-dialog-actions">
          <button id="promptDialogCancel" class="secondary-button" type="button">Abbrechen</button>
          <button id="promptDialogOk" class="submit-button compact-submit" type="button">OK</button>
        </div>
      </div>
    </div>

    <div id="personContextMenu" class="context-menu" hidden role="menu">
      <button class="context-menu-item" data-action="duplicate" type="button">Person duplizieren</button>
      <button class="context-menu-item" data-action="rename" type="button">Umbenennen</button>
      <button class="context-menu-item danger" data-action="delete" type="button">Person löschen</button>
    </div>

    <div id="choiceDialog" class="confirm-dialog" hidden role="dialog" aria-modal="true" aria-labelledby="choiceDialogTitle">
      <div class="confirm-dialog-backdrop"></div>
      <div class="confirm-dialog-box">
        <h2 id="choiceDialogTitle" class="confirm-dialog-title">Auswählen</h2>
        <p id="choiceDialogMessage" class="confirm-dialog-message"></p>
        <div id="choiceDialogOptions" class="choice-dialog-options"></div>
        <div class="confirm-dialog-actions">
          <button id="choiceDialogCancel" class="secondary-button" type="button">Abbrechen</button>
        </div>
      </div>
    </div>

    <div id="confirmDialog" class="confirm-dialog" hidden role="dialog" aria-modal="true" aria-labelledby="confirmDialogTitle">
      <div class="confirm-dialog-backdrop"></div>
      <div class="confirm-dialog-box">
        <h2 id="confirmDialogTitle" class="confirm-dialog-title">Bestätigen</h2>
        <p id="confirmDialogMessage" class="confirm-dialog-message"></p>
        <div class="confirm-dialog-actions">
          <button id="confirmDialogCancel" class="secondary-button" type="button">Abbrechen</button>
          <button id="confirmDialogOk" class="secondary-button danger-button" type="button">Ja, löschen</button>
        </div>
      </div>
    </div>

    <template id="categoryTemplate">
      <div class="category-item">
        <input class="category-name" maxlength="28" />
        <input class="category-budget" type="number" min="0" step="1" inputmode="decimal" />
        <button class="icon-button category-delete" type="button" title="Kategorie entfernen" aria-label="Kategorie entfernen">×</button>
      </div>
    </template>

    <script src="vendor/xlsx.full.min.js?v=60" defer></script>
    <script src="app.js?v=60" defer></script>
  </body>
</html>
